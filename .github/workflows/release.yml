name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install dependencies
        run: >
          python -m pip install --disable-pip-version-check
          -r requirements.txt pyinstaller

      - name: Build
        shell: bash
        run: |
          ICON=""
          SEP=":"
          if [ "$RUNNER_OS" != "Linux" ]; then
            ICON="--icon figforge/resources/icon.ico"
          fi
          if [ "$RUNNER_OS" == "Windows" ]; then
            SEP=";"
          fi
          python -m PyInstaller --noconfirm --windowed $ICON \
            --add-data "figforge/resources${SEP}figforge/resources" \
            --exclude-module tkinter --name FigForge run.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          Compress-Archive -Path dist/FigForge
          -DestinationPath "FigForge-${{ github.ref_name }}-windows-x64.zip"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -qry "../FigForge-${{ github.ref_name }}-macos-arm64.zip" FigForge.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "FigForge-${{ github.ref_name }}-linux-x64.tar.gz" -C dist FigForge

      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: |
            FigForge-*.zip
            FigForge-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            FigForge-*.zip
            FigForge-*.tar.gz
          prerelease: ${{ contains(github.ref_name, '-') }}
